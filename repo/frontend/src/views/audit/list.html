<!-- Initialize audit module -->
<script>
layui.use('audit', function() {
    layui.audit.initList();
});
</script>

<div class="audit-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Audit Trail</span>
        </div>
        <div class="layui-card-body">
            <div class="layui-form layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">Entity Type</label>
                    <div class="layui-input-inline">
                        <select id="filter-entity-type">
                            <option value="">All</option>
                            <option value="user">User</option>
                            <option value="activity">Activity</option>
                            <option value="order">Order</option>
                            <option value="violation">Violation</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">Date From</label>
                    <div class="layui-input-inline">
                        <input type="date" id="filter-date-from" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">Date To</label>
                    <div class="layui-input-inline">
                        <input type="date" id="filter-date-to" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
            </div>
            <table class="layui-table" lay-skin="line">
                <thead><tr><th>ID</th><th>Entity</th><th>Action</th><th>Changes</th><th>Date</th></tr></thead>
                <tbody id="audit-tbody"></tbody>
            </table>
            <div id="audit-pagination"></div>
        </div>
    </div>
</div>
