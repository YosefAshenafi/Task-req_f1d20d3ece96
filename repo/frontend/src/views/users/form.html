<div class="user-form-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;" id="form-title">Add User</span>
        </div>
        <div class="layui-card-body">
            <form class="layui-form layui-form-pane" id="user-form" lay-filter="user-form">
                <input type="hidden" name="id" id="user-id">

                <div class="layui-form-item">
                    <label class="layui-form-label">Username</label>
                    <div class="layui-input-block">
                        <input type="text" name="username" required lay-verify="required|min:3"
                               placeholder="Enter username" class="layui-input" id="input-username">
                    </div>
                </div>

                <div class="layui-form-item" id="password-group">
                    <label class="layui-form-label">Password</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" id="input-password"
                               placeholder="Enter password (min 10 characters)" class="layui-input">
                        <input type="checkbox" id="generate-password" lay-skin="switch" lay-text="Generate Temp Password">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Role</label>
                    <div class="layui-input-block">
                        <select name="role" lay-filter="user-role" id="input-role">
                            <option value="regular_user">Regular User</option>
                            <option value="administrator">Administrator</option>
                            <option value="operations_staff">Operations Staff</option>
                            <option value="team_lead">Team Lead</option>
                            <option value="reviewer">Reviewer</option>
                        </select>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Status</label>
                    <div class="layui-input-block">
                        <select name="status" lay-filter="user-status" id="input-status">
                            <option value="active">Active</option>
                            <option value="disabled">Disabled</option>
                        </select>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="submit-user" id="btn-submit">Create User</button>
                        <button type="reset" class="layui-btn layui-btn-primary">Reset</button>
                        <button type="button" class="layui-btn layui-btn-danger" id="btn-cancel">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Password display modal -->
    <div id="temp-password-modal" style="display: none; padding: 20px;">
        <p>Temporary password for user <strong id="temp-password-user"></strong>:</p>
        <div style="background: #f8f8f8; padding: 15px; margin: 15px 0; font-family: monospace; font-size: 18px; word-break: break-all;" id="temp-password-value"></div>
        <p style="color: #ff0000;">Please save this password - it will not be shown again!</p>
    </div>
</div>
