<div class="users-list-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">User Management</span>
            <button class="layui-btn layui-btn-normal layui-btn-sm" id="btn-add-user" style="float: right;">
                <i class="layui-icon layui-icon-add-1"></i> Add User
            </button>
        </div>
        <div class="layui-card-body">
            <!-- Filters -->
            <div class="layui-form layui-form-item" lay-filter="user-filters">
                <div class="layui-inline">
                    <label class="layui-form-label">Role</label>
                    <div class="layui-input-inline">
                        <select name="role" lay-filter="filter-role" id="filter-role">
                            <option value="">All Roles</option>
                            <option value="administrator">Administrator</option>
                            <option value="operations_staff">Operations Staff</option>
                            <option value="team_lead">Team Lead</option>
                            <option value="reviewer">Reviewer</option>
                            <option value="regular_user">Regular User</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">Status</label>
                    <div class="layui-input-inline">
                        <select name="status" lay-filter="filter-status" id="filter-status">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="disabled">Disabled</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">Search</label>
                    <div class="layui-input-inline">
                        <input type="text" name="keyword" placeholder="Username" class="layui-input" id="filter-keyword">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
            </div>

            <!-- Table -->
            <table class="layui-table" lay-skin="line" id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Failed Attempts</th>
                        <th>Locked Until</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- Populated by users.js -->
                </tbody>
            </table>

            <!-- Pagination -->
            <div id="users-pagination"></div>
        </div>
    </div>
</div>
