<!-- Initialize shipments module -->
<script>
layui.use('shipments', function() {
    layui.shipments.initList();
});
</script>

<div class="shipments-list-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Shipments</span>
        </div>
        <div class="layui-card-body">
            <!-- Filters -->
            <div class="layui-form layui-form-item" lay-filter="shipment-filters">
                <div class="layui-inline">
                    <label class="layui-form-label">Status</label>
                    <div class="layui-input-inline">
                        <select name="status" lay-filter="filter-status" id="filter-status">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="in_transit">In Transit</option>
                            <option value="delivered">Delivered</option>
                            <option value="exception">Exception</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">Search</label>
                    <div class="layui-input-inline">
                        <input type="text" name="tracking" placeholder="Tracking #" class="layui-input" id="filter-tracking">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="btn-search">Search</button>
                </div>
            </div>

            <!-- Table -->
            <table class="layui-table" lay-skin="line" id="shipments-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Order ID</th>
                        <th>Tracking #</th>
                        <th>Carrier</th>
                        <th>Status</th>
                        <th>Origin</th>
                        <th>Destination</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="shipments-tbody">
                    <!-- Populated by shipments.js -->
                </tbody>
            </table>

            <!-- Pagination -->
            <div id="shipments-pagination"></div>
        </div>
    </div>
</div>
