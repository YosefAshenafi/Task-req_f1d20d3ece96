<!-- Initialize tasks module -->
<script>
layui.use('tasks', function() {
    layui.tasks.initList();
});
</script>

<div class="tasks-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Tasks</span>
            <button class="layui-btn layui-btn-normal layui-btn-sm" id="btn-add-task" style="float: right;">
                <i class="layui-icon layui-icon-add-1"></i> Add Task
            </button>
        </div>
        <div class="layui-card-body">
            <table class="layui-table" lay-skin="line">
                <thead><tr><th>ID</th><th>Title</th><th>Assignee</th><th>Status</th><th>Due Date</th><th>Actions</th></tr></thead>
                <tbody id="tasks-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
