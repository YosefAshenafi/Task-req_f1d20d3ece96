<div class="preferences-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;">Preferences</span>
        </div>
        <div class="layui-card-body">
            <form class="layui-form layui-form-pane" lay-filter="preferences-form">
                <div class="layui-form-item">
                    <label class="layui-form-label">Arrival Reminders</label>
                    <div class="layui-input-block">
                        <input type="checkbox" name="arrival_reminders" lay-skin="switch" lay-text="ON|OFF">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">Activity Alerts</label>
                    <div class="layui-input-block">
                        <input type="checkbox" name="activity_alerts" lay-skin="switch" lay-text="ON|OFF">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">Order Alerts</label>
                    <div class="layui-input-block">
                        <input type="checkbox" name="order_alerts" lay-skin="switch" lay-text="ON|OFF">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">Violation Alerts</label>
                    <div class="layui-input-block">
                        <input type="checkbox" name="violation_alerts" lay-skin="switch" lay-text="ON|OFF">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit>Save Preferences</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
