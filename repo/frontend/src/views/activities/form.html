<!-- Initialize activities form -->
<script>
layui.use('activities', function() {
    layui.activities.initForm();
});
</script>

<div class="activity-form-view" style="padding: 15px;">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 18px; font-weight: 600;" id="form-title">Create Activity</span>
        </div>
        <div class="layui-card-body">
            <form class="layui-form layui-form-pane" id="activity-form" lay-filter="activity-form">
                <input type="hidden" name="id" id="activity-id">

                <div class="layui-form-item">
                    <label class="layui-form-label">Title</label>
                    <div class="layui-input-block">
                        <input type="text" name="title" required lay-verify="required"
                               placeholder="Activity title" class="layui-input" id="input-title">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Description</label>
                    <div class="layui-input-block">
                        <textarea name="body" placeholder="Activity description" 
                                  class="layui-textarea" id="input-body" rows="6"></textarea>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Tags</label>
                    <div class="layui-input-block">
                        <input type="text" name="tags" id="input-tags"
                               placeholder="Comma-separated tags" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Max Headcount</label>
                    <div class="layui-input-block">
                        <input type="number" name="max_headcount" id="input-max-headcount"
                               placeholder="0 for unlimited" class="layui-input" value="0">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Signup Start</label>
                    <div class="layui-input-block">
                        <input type="text" name="signup_start" id="input-signup-start"
                               placeholder="YYYY-MM-DD HH:mm" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Signup End</label>
                    <div class="layui-input-block">
                        <input type="text" name="signup_end" id="input-signup-end"
                               placeholder="YYYY-MM-DD HH:mm" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Eligibility Tags</label>
                    <div class="layui-input-block">
                        <input type="text" name="eligibility_tags" id="input-eligibility-tags"
                               placeholder="Comma-separated tags" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">Required Supplies</label>
                    <div class="layui-input-block">
                        <textarea name="required_supplies" placeholder="Comma-separated supplies"
                                  class="layui-textarea" id="input-supplies" rows="3"></textarea>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="submit-activity" id="btn-submit">Create</button>
                        <button type="button" class="layui-btn layui-btn-primary" id="btn-cancel">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
