<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CampusOps Test</title>
<link rel="stylesheet" href="/src/lib/layui/css/layui.css">
</head>
<body style="padding:50px;">
<h1 id="status">Testing...</h1>
<div id="info"></div>
<script src="/src/lib/layui/layui.js"></script>
<script>
document.getElementById('status').innerText = 'Page loaded, layui initializing...';
layui.use(['jquery','layer','common'], function($) {
    document.getElementById('status').innerText = 'Layui modules loaded!';
    var token = localStorage.getItem('campusops_token');
    var user = localStorage.getItem('campusops_user');
    document.getElementById('info').innerHTML = '<p>Token: ' + (token ? token.substring(0,20)+'...' : 'NONE') + '</p><p>User: ' + (user ? user : 'NONE') + '</p>';
});
</script>
</body>
</html>
