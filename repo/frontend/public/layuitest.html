<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title> layui Test</title>
</head>
<body style="padding:50px;">
<h1 id="status">Testing layui...</h1>
<div id="modules"></div>
<script src="/src/lib/layui/layui.js"></script>
<script>
document.getElementById('status').innerText = 'layui.js loaded';
try {
    layui.define = layui.define || function() {};
    layui.use(['jquery'], function($) {
        document.getElementById('status').innerText = 'jQuery module works!';
        document.getElementById('modules').innerHTML = '<p>jQuery version: ' + $.fn.jquery + '</p>';
    });
} catch(e) {
    document.getElementById('status').innerText = 'Error: ' + e.message;
}
</script>
</body>
</html>
