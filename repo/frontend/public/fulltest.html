<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CampusOps Full Test</title>
</head>
<body style="padding:50px;">
<h1 id="status">Testing...</h1>
<div id="info"></div>
<script src="/src/lib/layui/layui.js"></script>
<script>
document.getElementById('status').innerText = 'layui loading...';
layui.config({ base: '/src/modules/' });
layui.use(['jquery','layer','common'], function($) {
    document.getElementById('status').innerText = 'All modules loaded!';
    var info = '<p>jQuery: ' + $.fn.jquery + '</p>';
    info += '<p>layer: ' + (typeof layui.layer) + '</p>';
    info += '<p>common: ' + (typeof layui.common) + '</p>';
    var token = layui.common.getToken();
    var user = layui.common.getUser();
    info += '<p>Token: ' + (token ? token.substring(0,20)+'...' : 'NONE') + '</p>';
    info += '<p>User: ' + (user ? JSON.stringify(user) : 'NONE') + '</p>';
    document.getElementById('info').innerHTML = info;
});
</script>
</body>
</html>
