<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CampusOps Simple</title>
</head>
<body style="padding:50px;">
<h1>Simple Test</h1>
<div id="info"></div>
<script>
// Simple test - no layui
document.getElementById('info').innerHTML = '<p>JS running!</p>';
try {
    var token = localStorage.getItem('campusops_token');
    document.getElementById('info').innerHTML += '<p>Token: ' + (token ? 'yes' : 'no') + '</p>';
    if(!token) {
        window.location.href = '/login.html';
    }
} catch(e) {
    document.getElementById('info').innerHTML += '<p>Error: ' + e + '</p>';
}
</script>
</body>
</html>
